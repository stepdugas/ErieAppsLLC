<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#2563eb"/>
  <!-- Clipboard body -->
  <rect x="8" y="10" width="16" height="17" rx="2" fill="white" opacity="0.15"/>
  <rect x="8" y="10" width="16" height="17" rx="2" stroke="white" stroke-width="1.5"/>
  <!-- Clipboard clip -->
  <rect x="12" y="7" width="8" height="5" rx="2" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <!-- Checkmark lines -->
  <line x1="11" y1="16" x2="14" y2="19" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="19" x2="21" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkle dot -->
  <circle cx="24" cy="8" r="3" fill="#60a5fa"/>
  <line x1="24" y1="5.5" x2="24" y2="6.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="9.5" x2="24" y2="10.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="21.5" y1="8" x2="22.5" y2="8" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="25.5" y1="8" x2="26.5" y2="8" stroke="white" stroke-width="1" stroke-linecap="round"/>
</svg>
